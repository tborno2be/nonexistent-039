<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --black: #08090a;
    --text: #b8bfc8;
    --muted: #3e4450;
    --muted2: #5a6375;
    --accent: #c84b3c;
    --accent-dim: #6b261e;
    --mono: 'Share Tech Mono', 'Courier New', monospace;
  }
  html { height: 100%; }
  body {
    min-height: 100dvh;
    background: var(--black);
    color: var(--text);
    font-family: var(--mono);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }
  #rain {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0; opacity: 0.15;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
    pointer-events: none; z-index: 100;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.65) 100%);
    pointer-events: none; z-index: 1;
  }
  .page {
    position: relative; z-index: 10;
    width: 100%; max-width: 560px;
    min-height: 100dvh;
    display: flex; flex-direction: column;
    align-items: flex-start; justify-content: center;
    padding: 5rem 2rem 7rem;
  }
  .header {
    position: fixed;
    top: max(1.6rem, env(safe-area-inset-top, 1.6rem));
    left: 50%; transform: translateX(-50%);
    text-align: center; white-space: nowrap;
    opacity: 0; animation: fadeUp 1s ease 0.3s forwards; z-index: 20;
  }
  .header-title { font-size: clamp(9px, 2.2vw, 11px); letter-spacing: 0.4em; color: var(--muted2); }
  .header-sub   { font-size: clamp(8px, 2vw, 10px); letter-spacing: 0.3em; color: var(--accent-dim); margin-top: 3px; }
  .display {
    width: 100%;
    opacity: 0; animation: fadeUp 1s ease 0.8s forwards;
  }
  .section-label {
    font-size: clamp(9px, 2.2vw, 10px);
    letter-spacing: 0.35em; color: var(--accent); opacity: 0.65;
    margin-bottom: clamp(12px, 3vw, 18px);
    margin-top: clamp(24px, 6vw, 36px);
  }
  .section-label:first-child { margin-top: 0; }
  .char-line {
    display: flex; align-items: baseline;
    gap: clamp(8px, 2.5vw, 14px);
    opacity: 0; transform: translateY(5px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    margin-bottom: clamp(3px, 1vw, 5px);
  }
  .char-line.visible { opacity: 1; transform: translateY(0); }
  .char-index { font-size: clamp(9px, 2vw, 11px); color: var(--muted); min-width: 18px; flex-shrink: 0; }
  .char-name  { font-size: clamp(20px, 5.5vw, 26px); color: var(--text); letter-spacing: 0.05em; overflow: hidden; white-space: nowrap; }
  .divider    { width: 36px; height: 1px; background: var(--accent-dim); opacity: 0.35; margin: clamp(18px, 5vw, 28px) 0; }
  .location-line {
    font-size: clamp(24px, 7vw, 32px);
    color: var(--text); letter-spacing: 0.07em;
    opacity: 0; transform: translateY(5px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    white-space: nowrap;
  }
  .location-line.visible { opacity: 1; transform: translateY(0); }
  .footer {
    position: fixed;
    bottom: max(2rem, env(safe-area-inset-bottom, 2rem));
    left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    z-index: 20; opacity: 0; animation: fadeUp 1s ease 1.4s forwards;
  }
  .btn {
    background: transparent;
    border: 1px solid var(--accent-dim);
    color: var(--muted2);
    font-family: var(--mono);
    font-size: clamp(10px, 2.5vw, 11px);
    letter-spacing: 0.3em;
    padding: clamp(10px, 3vw, 13px) clamp(24px, 7vw, 36px);
    cursor: pointer;
    text-transform: uppercase;
    transition: color 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    user-select: none;
  }
  .btn:hover, .btn:focus-visible { color: var(--text); border-color: var(--accent); outline: none; }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .status-txt { font-size: clamp(8px, 2vw, 9px); letter-spacing: 0.22em; color: var(--muted); white-space: nowrap; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<canvas id="rain"></canvas>
<div class="page" role="main">
  <div class="header">
    <div class="header-title">龙族 · Dragon Raja</div>
    <div class="header-sub">遭遇生成器</div>
  </div>
  <div class="display" id="display" aria-live="polite">
    <div class="section-label">— 角色</div>
    <div id="c0" class="char-line"><span class="char-index">01</span><span class="char-name" id="cn0"></span></div>
    <div id="c1" class="char-line"><span class="char-index">02</span><span class="char-name" id="cn1"></span></div>
    <div id="c2" class="char-line"><span class="char-index">03</span><span class="char-name" id="cn2"></span></div>
    <div class="divider"></div>
    <div class="section-label">— 地点</div>
    <div class="location-line" id="loc"></div>
  </div>
  <div class="footer">
    <button class="btn" id="btn" onclick="generate()">生成偶遇</button>
    <div class="status-txt">NIBELUNGEN PROTOCOL · ACTIVE</div>
  </div>
</div>
<script>
const CHARS=["路明非","路鸣泽","楚子航","楚天骄","楚子航母亲","鹿芒","恺撒·加图索","诺诺","芬格尔·冯·弗林斯","零","夏弥","苏茜","兰斯洛特","希尔伯特·让·昂热","古德里安","施耐德","曼施坦因","富山雅史","帕西","EVA","副校长","守夜人","叶胜","酒德亚纪","曼斯·伦德施泰特","亚伯拉罕·血统契","阿卜杜拉·阿巴斯","源稚生","源稚女","风间琉璃","上杉绘梨衣","上杉越","橘政宗","赫尔佐格","邦达列夫","樱","樱井小暮","乌鸦","夜叉","犬山贺","风魔小太郎","宫本志雄","龙马弦一郎","酒德麻衣","薯片妞","老板","麻生真","苏晓樯","陈雯雯","赵孟华","路谷城","叔叔","婶婶","小胖","诺顿","康斯坦丁","耶梦加得","芬里厄","奥丁","尼德霍格","白王","黑王","大地与山之王","青铜与火之王","天空与风之王","海洋与水之王","雷娜塔","列昂尼德","塔季扬娜","庞贝·加图索","弗罗斯特·加图索","贝奥武夫","图灵先生","汉高","梅涅克·卡塞尔"];
const LOCS=["卡塞尔学院","英灵殿","冰窖","安珀馆","中央控制室","仕兰中学","北京地铁尼伯龙根","三峡","高天原","极乐馆","源氏重工","红井","东京塔","歌舞伎町","东京湾","尼伯龙根","黑天鹅港","青铜城","奥丁神域","意大利","西伯利亚"];
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function pick(arr,n){const c=[...arr],o=[];while(o.length<n){const i=Math.floor(Math.random()*c.length);o.push(c.splice(i,1)[0]);}return o;}
async function type(el,text,spd){el.textContent='';for(const ch of text){el.textContent+=ch;await sleep(spd+Math.random()*25);}}
let busy=false;
async function generate(){
  if(busy)return; busy=true;
  const btn=document.getElementById('btn'); btn.disabled=true;
  const chars=pick(CHARS,3), loc=pick(LOCS,1)[0];
  const cEls=[0,1,2].map(i=>document.getElementById('c'+i));
  const cnEls=[0,1,2].map(i=>document.getElementById('cn'+i));
  const locEl=document.getElementById('loc');
  cEls.forEach(el=>el.classList.remove('visible'));
  locEl.classList.remove('visible');
  await sleep(80);
  for(let i=0;i<3;i++){cEls[i].classList.add('visible');await sleep(100);await type(cnEls[i],chars[i],55);await sleep(50);}
  await sleep(120); locEl.classList.add('visible'); await sleep(100); await type(locEl,loc,65);
  busy=false; btn.disabled=false;
}
(function(){
  const c=document.getElementById('rain'),ctx=c.getContext('2d');let drops=[];
  function init(){
    c.width=window.innerWidth; c.height=window.innerHeight;
    const n=Math.floor(c.width/14);
    drops=Array.from({length:n},()=>({x:Math.random()*c.width,y:Math.random()*c.height,len:12+Math.random()*18,speed:4+Math.random()*7,op:0.08+Math.random()*0.3}));
  }
  init(); window.addEventListener('resize',init);
  function frame(){
    ctx.clearRect(0,0,c.width,c.height);
    drops.forEach(d=>{
      ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x-0.5,d.y+d.len);
      ctx.strokeStyle=`rgba(150,170,210,${d.op})`;ctx.lineWidth=0.6;ctx.stroke();
      d.y+=d.speed; if(d.y>c.height+d.len){d.y=-d.len;d.x=Math.random()*c.width;}
    });
    requestAnimationFrame(frame);
  }
  frame();
})();
window.addEventListener('load',()=>setTimeout(generate,1600));
</script>
